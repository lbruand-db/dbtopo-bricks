bundle:
  name: dbtopo-bricks

variables:
  catalog:
    default: "dev_catalog"
  schema:
    default: "ign_bdtopo"
  volume:
    default: "bronze_volume"
  departments_json:
    default: '["001"]'
  version_date:
    default: "2025-09-15"

artifacts:
  dbtopo_wheel:
    type: whl
    path: .
    build: uv build --wheel --out-dir dist

resources:
  jobs:
    bdtopo_load:
      name: "bdtopo-load-${bundle.target}"
      tasks:
        - task_key: setup_catalog
          notebook_task:
            notebook_path: notebooks/00_setup_catalog.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              volume: "${var.volume}"
          environment_key: minimal
        - task_key: download
          depends_on:
            - task_key: setup_catalog
          for_each_task:
            inputs: ${var.departments_json}
            concurrency: 10
            task:
              task_key: download_dept
              python_wheel_task:
                package_name: dbtopo
                entry_point: download
                parameters:
                  - "--departments"
                  - "{{input}}"
                  - "--catalog"
                  - "${var.catalog}"
                  - "--schema"
                  - "${var.schema}"
                  - "--volume"
                  - "${var.volume}"
                  - "--version-date"
                  - "${var.version_date}"
              environment_key: geo
        - task_key: extract_and_load
          depends_on:
            - task_key: download
          for_each_task:
            inputs: ${var.departments_json}
            concurrency: 10
            task:
              task_key: load_dept
              python_wheel_task:
                package_name: dbtopo
                entry_point: load
                parameters:
                  - "--departments"
                  - "{{input}}"
                  - "--catalog"
                  - "${var.catalog}"
                  - "--schema"
                  - "${var.schema}"
                  - "--volume"
                  - "${var.volume}"
                  - "--layers"
                  - "batiment"
              environment_key: geo
        - task_key: validate
          depends_on:
            - task_key: extract_and_load
          python_wheel_task:
            package_name: dbtopo
            entry_point: validate
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
          environment_key: wheel_only

      environments:
        - environment_key: minimal
          spec:
            client: "1"
        - environment_key: wheel_only
          spec:
            client: "1"
            dependencies:
              - "dist/*.whl"
              - "numpy<2"
              - click
              - pydantic
              - pyyaml
        - environment_key: geo
          spec:
            client: "1"
            dependencies:
              - "dist/*.whl"
              - "numpy<2"
              - py7zr
              - geopandas
              - pyogrio
              - shapely
              - pyproj
              - tqdm
              - requests
              - pydantic
              - pyyaml
              - click

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
    variables:
      catalog: "lucasbruand_catalog"
      departments_json: '["001"]'
  staging:
    variables:
      catalog: "staging_catalog"
      departments_json: '["001", "075", "092"]'
  prod:
    mode: production
    variables:
      catalog: "prod_catalog"
      departments_json: '["001", "002", "003", "004", "005", "006", "007", "008", "009", "010", "011", "012", "013", "014", "015", "016", "017", "018", "019", "020", "021", "022", "023", "024", "025", "026", "027", "028", "029", "030", "031", "032", "033", "034", "035", "036", "037", "038", "039", "040", "041", "042", "043", "044", "045", "046", "047", "048", "049", "050", "051", "052", "053", "054", "055", "056", "057", "058", "059", "060", "061", "062", "063", "064", "065", "066", "067", "068", "069", "070", "071", "072", "073", "074", "075", "076", "077", "078", "079", "080", "081", "082", "083", "084", "085", "086", "087", "088", "089", "090", "091", "092", "093", "094", "095", "2A", "2B"]'
    run_as:
      service_principal_name: "bdtopo-service-principal"
